<!--
  ╔══════════════════════════════════════════════════════════╗
  ║  PwaniStays — Shared Header Partial                     ║
  ║  File: /header.html  (repo root)                       ║
  ║                                                          ║
  ║  HOW TO USE ON EVERY PAGE                               ║
  ║  1. Add this ONE div where you want the header:         ║
  ║       <div id="site-header"></div>                      ║
  ║  2. Load header-loader.js at bottom of <body>:          ║
  ║       <script src="/header-loader.js"></script>         ║
  ║  3. Load i18n.js in <head> (already done for index):    ║
  ║       <script src="/i18n.js"></script>                  ║
  ║                                                          ║
  ║  The loader fetches this file and injects the header,   ║
  ║  then marks the correct nav link as "active" based on   ║
  ║  the current page path.                                 ║
  ╚══════════════════════════════════════════════════════════╝
-->

<!-- WhatsApp Float (shared across all pages) -->
<a href="https://wa.me/254738544784?text=Hello%20PwaniStays!%20I%20need%20help%20with%20a%20booking"
   class="whatsapp-float"
   target="_blank"
   rel="noopener noreferrer"
   aria-label="Chat on WhatsApp">
    <i class="fab fa-whatsapp" aria-hidden="true"></i>
</a>

<!-- Shared Header -->
<header role="banner">
    <nav class="navbar" aria-label="Main navigation">
        <!-- Logo -->
        <a href="/" class="logo-link">
            <img src="/logo-header.png"
                 alt="PwaniStays - Curated Coastal Stays"
                 class="logo-desktop"
                 style="height: 50px; width: auto;">
            <img src="/logo-mobile.png"
                 alt="PwaniStays"
                 class="logo-mobile"
                 style="height: 50px; width: auto;">
        </a>

        <!-- Mobile menu toggle -->
        <button class="menu-toggle" aria-label="Toggle menu" aria-expanded="false">
            <i class="fas fa-bars" aria-hidden="true"></i>
        </button>

        <!-- Nav links -->
        <ul class="nav-links" role="menubar">
            <li role="none">
                <a href="/" role="menuitem" data-i18n="nav_home" data-nav-page="home">Home</a>
            </li>
            <li role="none">
                <a href="/about" role="menuitem" data-i18n="nav_about" data-nav-page="about">About Us</a>
            </li>
            <li role="none">
                <a href="/accommodation" role="menuitem" data-i18n="nav_accommodation" data-nav-page="accommodation">Accommodation</a>
            </li>

            <!-- Experiences Dropdown -->
            <li role="none" class="dropdown">
                <a href="/experiences" role="menuitem" class="dropdown-toggle" data-i18n="nav_experiences" data-nav-page="experiences">Experiences ▾</a>
                <ul class="dropdown-menu">
                    <li><a href="/nairobi" data-i18n="nav_nairobi" data-nav-page="nairobi">Nairobi & Inland</a></li>
                    <li><a href="/safari" data-i18n="nav_safari" data-nav-page="safari">Safari</a></li>
                    <li><a href="/coastal-cultural" data-i18n="nav_coastal" data-nav-page="coastal-cultural">Coastal & Cultural</a></li>
                </ul>
            </li>

            <li role="none">
                <a href="/how-it-works" role="menuitem" data-i18n="nav_how_it_works" data-nav-page="how-it-works">How It Works</a>
            </li>
            <li role="none">
                <a href="/#contact" role="menuitem" data-i18n="nav_contact">Contact</a>
            </li>

            <!-- Header Search -->
            <li role="none" class="header-search-container" id="mobileSearchContainer">
                <button id="searchToggle" aria-label="Toggle search">
                    <i class="fas fa-search"></i>
                </button>
                <input type="text"
                       id="headerSearch"
                       placeholder="Search beachfront, villa, Nyali..."
                       aria-label="Search properties">
            </li>
        </ul>

        <!-- Right side: Book Now + Language Switcher -->
        <div class="navbar-right">
            <a href="https://wa.me/254738544784?text=Hello%20PwaniStays!%20I%20would%20like%20to%20book%20a%20stay%20or%20get%20more%20information."
               class="btn-book"
               data-i18n="nav_book_now">Book Now</a>
            <div id="langSwitcher" aria-label="Select language"></div>
        </div>
    </nav>
</header>
