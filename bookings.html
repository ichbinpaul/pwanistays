<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PwaniStays Bookings</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div id="app">Loading...</div>
<script>
    // ----- ONLY ONE DECLARATION -----
    const SUPABASE_URL = "https://aanyrtsfeeynykskwxen.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_jda30uQX9ZzR_V8CzkeERw_nfx-QWkD";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    (async () => {
        const { data: { session } } = await supabase.auth.getSession();
        if (!session) {
            document.getElementById('app').innerHTML = `
                <div style="max-width:400px; margin:50px auto; padding:20px; border:1px solid #ccc; border-radius:10px;">
                    <h2>Admin Login</h2>
                    <input type="email" id="email" placeholder="Email" style="width:100%; margin-bottom:10px;"><br>
                    <input type="password" id="password" placeholder="Password" style="width:100%; margin-bottom:10px;"><br>
                    <button id="loginBtn">Login</button>
                </div>
            `;
            document.getElementById('loginBtn').onclick = async () => {
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                const { error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) alert(error.message);
                else location.reload();
            };
        } else {
            // Show simple table
            const { data: bookings, error } = await supabase.from('bookings').select('*').order('created_at', { ascending: false });
            if (error) {
                document.getElementById('app').innerHTML = `<p style="color:red">Error: ${error.message}</p>`;
                return;
            }
            let html = `<h1>Bookings <button id="logoutBtn">Logout</button></h1><table border="1" cellpadding="8"><thead><tr><th>ID</th><th>Guest</th><th>Location</th><th>Dates</th></tr></thead><tbody>`;
            bookings.forEach(b => {
                html += `<tr><td>${b.id || ''}</td><td>${b.guest_name || ''}</td><td>${b.location || ''}</td><td>${b.check_in || ''} → ${b.check_out || ''}</td></tr>`;
            });
            html += `</tbody></table>`;
            document.getElementById('app').innerHTML = html;
            document.getElementById('logoutBtn').onclick = async () => { await supabase.auth.signOut(); location.reload(); };
        }
    })();
</script>
</body>
</html>
