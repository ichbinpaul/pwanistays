<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PwaniStays – Bookings Admin</title>
    <style>
        * { box-sizing: border-box; font-family: system-ui, 'Segoe UI', monospace; }
        body { background: #f0f4f2; margin: 0; padding: 20px; }
        .container { max-width: 1600px; margin: 0 auto; background: white; border-radius: 24px; padding: 24px; box-shadow: 0 8px 24px rgba(0,0,0,0.05); }
        h1 { margin-top: 0; display: flex; justify-content: space-between; align-items: center; color: #0d7a5f; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #ddd; }
        .tab { padding: 10px 20px; cursor: pointer; background: #f0f0f0; border-radius: 20px 20px 0 0; }
        .tab.active { background: #0d7a5f; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        th, td { border: 1px solid #ddd; padding: 8px 10px; text-align: left; vertical-align: top; }
        th { background: #0d7a5f; color: white; position: sticky; top: 0; }
        tr:nth-child(even) { background: #f9f9f9; }
        .table-container { overflow-x: auto; max-height: 500px; overflow-y: auto; margin-top: 20px; }
        button { background: #0d7a5f; color: white; border: none; padding: 6px 14px; border-radius: 30px; cursor: pointer; font-weight: 500; }
        button:hover { background: #0f9b7a; transform: translateY(-1px); }
        button.danger { background: #dc3545; }
        button.danger:hover { background: #c82333; }
        button.outline { background: transparent; border: 1px solid #0d7a5f; color: #0d7a5f; }
        button.outline:hover { background: #0d7a5f10; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 28px; border-radius: 24px; width: 90%; max-width: 900px; max-height: 90vh; overflow-y: auto; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .full-width { grid-column: span 2; }
        .form-field { display: flex; flex-direction: column; }
        label { font-weight: 600; margin-bottom: 5px; font-size: 0.85rem; }
        input, select, textarea { padding: 8px 12px; border-radius: 12px; border: 1px solid #ccc; font-size: 0.85rem; }
        .actions { margin: 20px 0; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
        .search { margin-bottom: 20px; display: flex; gap: 12px; }
        .search input { flex: 1; padding: 10px 15px; border-radius: 40px; border: 1px solid #ccc; }
        .loading { text-align: center; padding: 40px; color: #0d7a5f; }
        .logout { background: #6c757d; }
        .login-container { max-width: 400px; margin: 100px auto; background: white; padding: 30px; border-radius: 24px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
        .login-container h2 { margin-top: 0; color: #0d7a5f; }
        .login-container input { width: 100%; margin-bottom: 15px; }
        .status-complete { background-color: #d4edda !important; color: #155724; }
        .status-progress { background-color: #fff3cd !important; color: #856404; }
        .status-pending { background-color: #f8d7da !important; color: #721c24; }
        .checkbox-col { width: 30px; text-align: center; }
        .kpi-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap: 16px; margin-bottom: 30px; }
        .card { background: #f8f9fa; border-radius: 16px; padding: 16px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .card h3 { margin: 0 0 8px 0; font-size: 0.9rem; color: #555; }
        .card .value { font-size: 1.8rem; font-weight: bold; color: #0d7a5f; }
        .stats-table { width: 100%; margin-top: 30px; border-collapse: collapse; font-size: 0.85rem; }
        .stats-table th, .stats-table td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        .stats-table th { background: #e9ecef; color: #0d7a5f; }
        .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px,1fr)); gap: 24px; margin-top: 40px; margin-bottom: 30px; }
        .chart-container { background: white; border-radius: 16px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        canvas { max-height: 300px; width: 100%; }
        .progress-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .progress-card { background: white; padding: 30px; border-radius: 24px; text-align: center; min-width: 300px; }
        .progress-bar { width: 100%; height: 20px; background: #e0e0e0; border-radius: 10px; overflow: hidden; margin: 20px 0; }
        .progress-fill { width: 0%; height: 100%; background: #0d7a5f; transition: width 0.3s; }
        @media (max-width: 700px) { .form-grid { grid-template-columns: 1fr; } .full-width { grid-column: span 1; } th, td { font-size: 0.7rem; padding: 4px 6px; } .charts-grid { grid-template-columns: 1fr; } }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div id="app"></div>

<script>
    const SUPABASE_URL = "https://aanyrtsfeeynykskwxen.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_jda30uQX9ZzR_V8CzkeERw_nfx-QWkD";
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let bookings = [];
    let filterText = "";
    let locationOptions = [], unitTypeOptions = [], sourceOptions = [], subSourceOptions = [];
    const statusOptions = ["Complete", "In Progress", "Pending"];
    const genderOptions = ["Male", "Female", "Prefer not to say"];
    let activeTab = "bookings";
    let charts = {};

    function calculateNights(checkIn, checkOut) {
        if (!checkIn || !checkOut) return null;
        const start = new Date(checkIn), end = new Date(checkOut);
        if (isNaN(start) || isNaN(end)) return null;
        return Math.ceil(Math.abs(end - start) / (1000 * 60 * 60 * 24));
    }
    function getMonthFromDate(dateStr) {
        if (!dateStr) return null;
        const d = new Date(dateStr);
        if (isNaN(d)) return null;
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
    }
    function autoCalculate(row) {
        const paid = parseFloat(row.guest_paid) || 0;
        const cost = parseFloat(row.host_cost) || 0;
        const charges = parseFloat(row.charges) || 0;
        row.profit = paid - cost - charges;
        row.nights = (row.check_in && row.check_out) ? calculateNights(row.check_in, row.check_out) : null;
        row.month = row.check_in ? getMonthFromDate(row.check_in) : null;
        return row;
    }

    async function loadDistinctOptions() {
        const tables = [
            { column: 'location', target: locationOptions },
            { column: 'unit_type', target: unitTypeOptions },
            { column: 'source', target: sourceOptions },
            { column: 'sub_source', target: subSourceOptions }
        ];
        for (let t of tables) {
            const { data, error } = await supabaseClient.from('bookings').select(t.column).not(t.column, 'is', null);
            if (!error && data) {
                const vals = [...new Set(data.map(row => row[t.column]).filter(v => v && v.trim() !== ''))];
                t.target.length = 0;
                t.target.push(...vals.sort());
            }
        }
    }

    function populateDropdowns() {
        const locationSel = document.getElementById('location');
        if (locationSel) {
            const current = locationSel.value;
            locationSel.innerHTML = '<option value="">Select or add new</option>';
            locationOptions.forEach(l => { const opt = document.createElement('option'); opt.value = l; opt.textContent = l; locationSel.appendChild(opt); });
            const addOpt = document.createElement('option'); addOpt.value = "__ADD_NEW__"; addOpt.textContent = "+ Add new location"; locationSel.appendChild(addOpt);
            if (current && locationOptions.includes(current)) locationSel.value = current;
        }
        const unitTypeSel = document.getElementById('unit_type');
        if (unitTypeSel) {
            const current = unitTypeSel.value;
            unitTypeSel.innerHTML = '<option value="">Select or add new</option>';
            unitTypeOptions.forEach(t => { const opt = document.createElement('option'); opt.value = t; opt.textContent = t; unitTypeSel.appendChild(opt); });
            const addOpt = document.createElement('option'); addOpt.value = "__ADD_NEW__"; addOpt.textContent = "+ Add new unit type"; unitTypeSel.appendChild(addOpt);
            if (current && unitTypeOptions.includes(current)) unitTypeSel.value = current;
        }
        const sourceSel = document.getElementById('source');
        if (sourceSel) {
            const current = sourceSel.value;
            sourceSel.innerHTML = '<option value="">Select or add new</option>';
            sourceOptions.forEach(s => { const opt = document.createElement('option'); opt.value = s; opt.textContent = s; sourceSel.appendChild(opt); });
            const addOpt = document.createElement('option'); addOpt.value = "__ADD_NEW__"; addOpt.textContent = "+ Add new source"; sourceSel.appendChild(addOpt);
            if (current && sourceOptions.includes(current)) sourceSel.value = current;
        }
        const subSourceSel = document.getElementById('sub_source');
        if (subSourceSel) {
            const current = subSourceSel.value;
            subSourceSel.innerHTML = '<option value="">Select or add new</option>';
            subSourceOptions.forEach(ss => { const opt = document.createElement('option'); opt.value = ss; opt.textContent = ss; subSourceSel.appendChild(opt); });
            const addOpt = document.createElement('option'); addOpt.value = "__ADD_NEW__"; addOpt.textContent = "+ Add new sub‑source"; subSourceSel.appendChild(addOpt);
            if (current && subSourceOptions.includes(current)) subSourceSel.value = current;
        }
        const genderSel = document.getElementById('gender');
        if (genderSel) {
            const current = genderSel.value;
            genderSel.innerHTML = '';
            genderOptions.forEach(g => { const opt = document.createElement('option'); opt.value = g; opt.textContent = g; genderSel.appendChild(opt); });
            if (current) genderSel.value = current;
        }
        const statusSel = document.getElementById('status');
        if (statusSel) {
            const current = statusSel.value;
            statusSel.innerHTML = '';
            statusOptions.forEach(s => { const opt = document.createElement('option'); opt.value = s; opt.textContent = s; statusSel.appendChild(opt); });
            if (current) statusSel.value = current;
        }
    }

    async function addNewOption(category, value) {
        if (!value || !value.trim()) return;
        value = value.trim();
        let arr;
        if (category === 'location') arr = locationOptions;
        else if (category === 'unit_type') arr = unitTypeOptions;
        else if (category === 'source') arr = sourceOptions;
        else if (category === 'sub_source') arr = subSourceOptions;
        else return;
        if (!arr.includes(value)) { arr.push(value); arr.sort(); }
        populateDropdowns();
    }

    async function loadBookings() {
        const { data, error } = await supabaseClient.from('bookings').select('*').order('created_at', { ascending: false });
        if (error) { console.error(error); return; }
        bookings = (data || []).map(b => autoCalculate(b));
        await loadDistinctOptions();
        populateDropdowns();
        if (activeTab === 'bookings') renderBookingsTable();
        else renderAnalytics();
    }

    function getStatusClass(status) {
        if (status === 'Complete') return 'status-complete';
        if (status === 'In Progress') return 'status-progress';
        if (status === 'Pending') return 'status-pending';
        return '';
    }

    function renderBookingsTable() {
        const container = document.getElementById('bookingsContainer');
        if (!container) return;
        let filtered = filterText ? bookings.filter(b =>
            (b.guest_name && b.guest_name.toLowerCase().includes(filterText)) ||
            (b.unit_name && b.unit_name.toLowerCase().includes(filterText)) ||
            (b.location && b.location.toLowerCase().includes(filterText)) ||
            (b.phone && b.phone.includes(filterText))
        ) : bookings;
        if (filtered.length === 0) { container.innerHTML = '<p>✨ No bookings found.</p>'; return; }
        const cols = ['id','guest_name','gender','phone','unit_name','location','unit_type','check_in','check_out','nights','guest_paid','host_cost','charges','profit','status','source','sub_source','month','host','notes'];
        const headers = ['Select','Booking ID','Guest Name','Gender','Phone','Unit Name','Location','Unit Type','Check In','Check Out','Nights','Guest Paid','Host Cost','Charges','Profit','Status','Source','Sub-Source','Month','Host','Notes'];
        let html = `<div class="actions"><button id="deleteSelectedBtn" class="danger">🗑️ Delete Selected</button>
                    <button id="exportSelectedBtn" class="outline">📎 Export Selected</button>
                    <button id="markCompleteBtn" class="outline">✅ Mark Complete</button>
                    <button id="markProgressBtn" class="outline">⏳ Mark In Progress</button>
                    <button id="markPendingBtn" class="outline">⏰ Mark Pending</button></div>`;
        html += '<div class="table-container">';
        html += '<table><thead><tr><th class="checkbox-col"><input type="checkbox" id="selectAllCheckbox"></th>';
        headers.slice(1).forEach(h => html += `<th>${h}</th>`);
        html += '<th>Actions</th></tr></thead><tbody>';
        filtered.forEach(b => {
            const statusClass = getStatusClass(b.status);
            html += `<tr class="${statusClass}" data-id="${b.id}">`;
            html += `<td class="checkbox-col"><input type="checkbox" class="rowCheckbox" data-id="${b.id}"></td>`;
            cols.forEach(col => {
                let val = b[col] ?? '';
                if (col === 'check_in' || col === 'check_out') val = val ? val.substring(0,10) : '';
                html += `<td>${val}</td>`;
            });
            html += `<td><button class="editBtn" data-id="${b.id}">✏️ Edit</button> <button class="deleteBtn" data-id="${b.id}">🗑️ Delete</button></td>`;
            html += '</tr>';
        });
        html += '</tbody></table></div>';
        container.innerHTML = html;
        document.querySelectorAll('.editBtn').forEach(btn => btn.addEventListener('click', () => editBooking(btn.dataset.id)));
        document.querySelectorAll('.deleteBtn').forEach(btn => btn.addEventListener('click', () => deleteBooking(btn.dataset.id)));
        const selectAll = document.getElementById('selectAllCheckbox');
        if (selectAll) selectAll.addEventListener('change', (e) => document.querySelectorAll('.rowCheckbox').forEach(cb => cb.checked = e.target.checked));
        document.getElementById('deleteSelectedBtn')?.addEventListener('click', deleteSelectedBookings);
        document.getElementById('exportSelectedBtn')?.addEventListener('click', exportSelectedBookings);
        document.getElementById('markCompleteBtn')?.addEventListener('click', () => bulkUpdateStatus('Complete'));
        document.getElementById('markProgressBtn')?.addEventListener('click', () => bulkUpdateStatus('In Progress'));
        document.getElementById('markPendingBtn')?.addEventListener('click', () => bulkUpdateStatus('Pending'));
    }

    function openModal(booking = null) {
        const modal = document.getElementById('modal');
        if (!modal) return;
        document.getElementById('bookingForm').reset();
        document.getElementById('editId').value = '';
        if (booking) {
            document.getElementById('modalTitle').innerText = 'Edit Booking';
            for (let [key, value] of Object.entries(booking)) {
                const field = document.getElementById(key);
                if (field) field.value = value ?? '';
            }
            document.getElementById('editId').value = booking.id;
        } else {
            document.getElementById('modalTitle').innerText = 'Add Booking';
        }
        populateDropdowns();
        modal.style.display = 'flex';
    }

    function closeModal() { const modal = document.getElementById('modal'); if (modal) modal.style.display = 'none'; }

    async function saveBooking() {
        const id = document.getElementById('editId').value;
        const data = {};
        const fields = ['id','guest_name','gender','phone','unit_name','location','unit_type','check_in','check_out','nights','guest_paid','host_cost','charges','profit','status','source','sub_source','month','host','notes'];
        for (let f of fields) { let val = document.getElementById(f).value; if (val === '') val = null; data[f] = val; }
        for (let {field, category} of [{field:'location', category:'location'},{field:'unit_type', category:'unit_type'},{field:'source', category:'source'},{field:'sub_source', category:'sub_source'}]) {
            if (data[field] === '__ADD_NEW__') {
                const newVal = prompt(`Enter new ${category}:`);
                if (newVal && newVal.trim()) { data[field] = newVal.trim(); await addNewOption(category, data[field]); }
                else { alert(`${category} cannot be empty.`); return; }
            }
        }
        autoCalculate(data);
        data.profit = parseFloat(data.profit) || 0;
        data.nights = data.nights ? parseInt(data.nights) : null;
        let error = null;
        if (id) {
            const { error: err } = await supabaseClient.from('bookings').update(data).eq('id', id);
            error = err;
        } else {
            data.created_at = new Date().toISOString();
            data.updated_at = data.created_at;
            const { error: err } = await supabaseClient.from('bookings').insert([data]);
            error = err;
        }
        if (error) alert(`❌ Error: ${error.message}`);
        else { closeModal(); loadBookings(); }
    }

    async function editBooking(id) { const booking = bookings.find(b => b.id === id); if (booking) openModal(booking); }
    async function deleteBooking(id) { if (!confirm('⚠️ Delete this booking permanently?')) return; const { error } = await supabaseClient.from('bookings').delete().eq('id', id); if (error) alert(`Delete failed: ${error.message}`); else loadBookings(); }

    async function deleteSelectedBookings() {
        const selected = Array.from(document.querySelectorAll('.rowCheckbox:checked')).map(cb => cb.dataset.id);
        if (selected.length === 0) { alert('No bookings selected.'); return; }
        if (!confirm(`Delete ${selected.length} booking(s) permanently?`)) return;
        const { error } = await supabaseClient.from('bookings').delete().in('id', selected);
        if (error) alert(`Delete failed: ${error.message}`);
        else loadBookings();
    }

    async function bulkUpdateStatus(newStatus) {
        const selected = Array.from(document.querySelectorAll('.rowCheckbox:checked')).map(cb => cb.dataset.id);
        if (selected.length === 0) { alert('No bookings selected.'); return; }
        if (!confirm(`Update ${selected.length} booking(s) to "${newStatus}"?`)) return;
        const { error } = await supabaseClient.from('bookings').update({ status: newStatus }).in('id', selected);
        if (error) alert(`Update failed: ${error.message}`);
        else loadBookings();
    }

    function exportSelectedBookings() {
        const selectedIds = Array.from(document.querySelectorAll('.rowCheckbox:checked')).map(cb => cb.dataset.id);
        let dataToExport = selectedIds.length ? bookings.filter(b => selectedIds.includes(b.id)) : bookings;
        if (dataToExport.length === 0) { alert('No bookings to export.'); return; }
        const cols = ['id','guest_name','gender','phone','unit_name','location','unit_type','check_in','check_out','nights','guest_paid','host_cost','charges','profit','status','source','sub_source','month','host','notes'];
        const headers = ['Booking ID','Guest Name','Gender','Phone Number','Unit Name','Location','Unit Type','Check-In','Check-Out','Nights','Guest Paid (KES)','Host Cost (KES)','Charges (KES)','Profit (KES)','Status','Source','Sub-Source','Month','Host','Notes'];
        const csvRows = [headers.join(',')];
        for (let b of dataToExport) {
            const row = cols.map(col => {
                let val = b[col] ?? '';
                if (typeof val === 'string') val = val.replace(/"/g, '""');
                if (val.includes(',') || val.includes('"')) val = `"${val}"`;
                return val;
            });
            csvRows.push(row.join(','));
        }
        const blob = new Blob([csvRows.join('\n')], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `bookings_export_${new Date().toISOString().slice(0,19)}.csv`;
        link.click();
        URL.revokeObjectURL(link.href);
    }

    // ----- CSV Import with comma stripping and numeric conversion -----
    async function importCSVWithProgress() {
        const input = document.createElement('input'); input.type = 'file'; input.accept = '.csv';
        input.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const modalDiv = document.createElement('div');
            modalDiv.id = 'progressModal';
            modalDiv.className = 'progress-modal';
            modalDiv.innerHTML = `
                <div class="progress-card">
                    <h3>Importing CSV...</h3>
                    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
                    <p id="progressStatus">Parsing CSV...</p>
                    <p id="progressDetail"></p>
                </div>
            `;
            document.body.appendChild(modalDiv);
            const progressFill = document.getElementById('progressFill');
            const progressStatus = document.getElementById('progressStatus');
            const progressDetail = document.getElementById('progressDetail');

            const results = await new Promise((resolve) => {
                Papa.parse(file, {
                    header: true,
                    skipEmptyLines: true,
                    complete: resolve,
                    error: (err) => resolve({ error: err })
                });
            });
            if (results.error) {
                modalDiv.remove();
                alert(`CSV parsing error: ${results.error.message}`);
                return;
            }
            const data = results.data;
            if (data.length === 0) { modalDiv.remove(); alert('CSV is empty.'); return; }
            const rawKeys = Object.keys(data[0]);
            const cleanKeys = rawKeys.map(k => k.replace(/^\uFEFF/, '').trim());
            const columnMap = {
                'Booking ID': 'id',
                'Guest Name': 'guest_name',
                'Gender': 'gender',
                'Phone Number': 'phone',
                'Unit Name': 'unit_name',
                'Location': 'location',
                'Unit Type': 'unit_type',
                'Check-In': 'check_in',
                'Check-Out': 'check_out',
                'Nights': 'nights',
                'Guest Paid (KES)': 'guest_paid',
                'Host Cost (KES)': 'host_cost',
                'Charges (KES)': 'charges',
                'Profit (KES)': 'profit',
                'Status': 'status',
                'Source': 'source',
                'Sub-Source': 'sub_source',
                'Sub Source': 'sub_source',
                'Subsource': 'sub_source',
                'Month': 'month',
                'Host': 'host',
                'Notes': 'notes'
            };
            let headerMap = {};
            for (let i = 0; i < cleanKeys.length; i++) {
                const friendly = cleanKeys[i];
                if (columnMap[friendly]) headerMap[friendly] = columnMap[friendly];
            }
            if (!headerMap['Booking ID'] || !headerMap['Guest Name']) {
                modalDiv.remove();
                alert('CSV must contain "Booking ID" and "Guest Name" columns.');
                return;
            }
            let imported = 0, skipped = 0;
            let skippedRows = [];
            const totalRows = data.length;
            for (let idx = 0; idx < totalRows; idx++) {
                const row = data[idx];
                const dbRow = {};
                for (let [friendly, dbCol] of Object.entries(headerMap)) {
                    let val = row[friendly];
                    if (val !== undefined && val !== null && val !== '') {
                        val = val.toString().trim();
                        // Remove commas from numeric fields
                        if (['guest_paid', 'host_cost', 'charges', 'profit'].includes(dbCol)) {
                            val = val.replace(/,/g, '');
                        }
                        dbRow[dbCol] = val;
                    } else {
                        dbRow[dbCol] = null;
                    }
                }
                if (dbRow.id) dbRow.id = dbRow.id.trim();
                if (dbRow.guest_name) dbRow.guest_name = dbRow.guest_name.trim();
                if (!dbRow.id || !dbRow.guest_name) {
                    skipped++;
                    skippedRows.push(idx+2);
                    console.log(`Row ${idx+2} skipped: id="${dbRow.id}", guest_name="${dbRow.guest_name}"`);
                    continue;
                }
                if (dbRow.check_in) dbRow.check_in = dbRow.check_in.substring(0,10);
                if (dbRow.check_out) dbRow.check_out = dbRow.check_out.substring(0,10);
                autoCalculate(dbRow);
                // Convert numeric fields to numbers (they are strings after comma removal)
                ['guest_paid', 'host_cost', 'charges', 'profit', 'nights'].forEach(f => {
                    if (dbRow[f] !== null && dbRow[f] !== '') dbRow[f] = parseFloat(dbRow[f]);
                    if (isNaN(dbRow[f])) dbRow[f] = null;
                });
                const { data: existing } = await supabaseClient.from('bookings').select('id').eq('id', dbRow.id);
                if (existing && existing.length) {
                    const { error } = await supabaseClient.from('bookings').update(dbRow).eq('id', dbRow.id);
                    if (!error) imported++;
                    else { skipped++; skippedRows.push(idx+2); console.log(`Row ${idx+2} update error: ${error?.message}`); }
                } else {
                    dbRow.created_at = new Date().toISOString();
                    dbRow.updated_at = dbRow.created_at;
                    const { error } = await supabaseClient.from('bookings').insert([dbRow]);
                    if (!error) imported++;
                    else { skipped++; skippedRows.push(idx+2); console.log(`Row ${idx+2} insert error: ${error?.message}`); }
                }
                const percent = Math.round(((idx+1)/totalRows)*100);
                progressFill.style.width = `${percent}%`;
                progressStatus.innerText = `Processing row ${idx+1} of ${totalRows}...`;
                progressDetail.innerText = `Imported: ${imported}, Skipped: ${skipped}`;
                await new Promise(r => setTimeout(r, 5));
            }
            modalDiv.remove();
            let msg = `Import completed: ${imported} imported/updated, ${skipped} skipped/errors.`;
            if (skippedRows.length) msg += `\nSkipped rows (approx): ${skippedRows.join(', ')}. Check console for details.`;
            alert(msg);
            loadBookings();
        };
        input.click();
    }

    // ----- Analytics with robust object creation -----
    function computeAnalytics() {
        const totalBookings = bookings.length;
        const completed = bookings.filter(b => b.status === 'Complete').length;
        const inProgress = bookings.filter(b => b.status === 'In Progress').length;
        const pending = bookings.filter(b => b.status === 'Pending').length;
        const totalRevenue = bookings.reduce((sum, b) => sum + (parseFloat(b.guest_paid) || 0), 0);
        const totalProfit = bookings.reduce((sum, b) => sum + (parseFloat(b.profit) || 0), 0);

        // Monthly profit trend
        const monthlyProfit = {};
        bookings.forEach(b => { if (b.month && b.profit) monthlyProfit[b.month] = (monthlyProfit[b.month] || 0) + b.profit; });
        const months = Object.keys(monthlyProfit).sort();
        const monthlyProfitData = months.map(m => monthlyProfit[m]);

        // Location performance
        const locationStats = {};
        bookings.forEach(b => {
            if (b.location) {
                if (!locationStats[b.location]) locationStats[b.location] = { count: 0, profit: 0 };
                locationStats[b.location].count++;
                locationStats[b.location].profit += (parseFloat(b.profit) || 0);
            }
        });
        const locations = Object.keys(locationStats).sort();

        // Unit type performance
        const unitTypeStats = {};
        bookings.forEach(b => {
            if (b.unit_type) {
                if (!unitTypeStats[b.unit_type]) unitTypeStats[b.unit_type] = { count: 0, profit: 0 };
                unitTypeStats[b.unit_type].count++;
                unitTypeStats[b.unit_type].profit += (parseFloat(b.profit) || 0);
            }
        });
        const unitTypes = Object.keys(unitTypeStats).sort();

        // Source performance
        const sourceStats = {};
        bookings.forEach(b => {
            if (b.source) {
                if (!sourceStats[b.source]) sourceStats[b.source] = { count: 0, profit: 0 };
                sourceStats[b.source].count++;
                sourceStats[b.source].profit += (parseFloat(b.profit) || 0);
            }
        });
        const sources = Object.keys(sourceStats).sort();
        const sourceProfits = sources.map(s => sourceStats[s].profit);
        const sourceCounts = sources.map(s => sourceStats[s].count);

        // Sub-source (New/Returning/Referral)
        const subSourceStats = {};
        bookings.forEach(b => {
            const ss = (b.sub_source || '').trim();
            if (ss) {
                if (!subSourceStats[ss]) subSourceStats[ss] = { count: 0, profit: 0 };
                subSourceStats[ss].count++;
                subSourceStats[ss].profit += (parseFloat(b.profit) || 0);
            }
        });
        const retentionLabels = Object.keys(subSourceStats).sort();
        const retentionProfits = retentionLabels.map(l => subSourceStats[l].profit);
        const retentionCounts = retentionLabels.map(l => subSourceStats[l].count);

        const referralCount = subSourceStats['Referral']?.count || 0;
        const referralProfit = subSourceStats['Referral']?.profit || 0;
        const loyalCount = subSourceStats['Returning']?.count || 0;
        const loyalProfit = subSourceStats['Returning']?.profit || 0;
        const newCount = subSourceStats['New']?.count || 0;
        const newProfit = subSourceStats['New']?.profit || 0;

        // Gender analytics
        const genderStats = {};
        bookings.forEach(b => {
            const g = b.gender || 'Not stated';
            if (!genderStats[g]) genderStats[g] = { count: 0, profit: 0, revenue: 0 };
            genderStats[g].count++;
            genderStats[g].profit += (parseFloat(b.profit) || 0);
            genderStats[g].revenue += (parseFloat(b.guest_paid) || 0);
        });
        const genderLabels = Object.keys(genderStats).sort();
        const genderCounts = genderLabels.map(g => genderStats[g].count);
        const genderProfits = genderLabels.map(g => genderStats[g].profit);

        return {
            totalBookings, completed, inProgress, pending, totalRevenue, totalProfit,
            months, monthlyProfitData,
            locations, locationStats,
            unitTypes, unitTypeStats,
            sources, sourceProfits, sourceCounts, sourceStats,
            retentionLabels, retentionProfits, retentionCounts,
            referralCount, referralProfit, loyalCount, loyalProfit, newCount, newProfit,
            genderLabels, genderCounts, genderProfits, genderStats
        };
    }

        // Add charts below tables
        html += `<div class="charts-grid">

        rows.push(['In Progress', data.inProgress]);
        rows.push(['Pending', data.pending]);
        rows.push(['Total Revenue (KES)', data.totalRevenue]);
        rows.push(['Total Profit (KES)', data.totalProfit]);
        rows.push(['Referral Count', data.referralCount]);
        rows.push(['Referral Profit (KES)', data.referralProfit]);
        rows.push(['']);
        rows.push(['Monthly Profit','']);
        data.months.forEach((m,i) => rows.push([m, data.monthlyProfitData[i]]));
        rows.push(['']);
        rows.push(['Location Performance','','']);
        rows.push(['Location','Bookings','Profit']);
        data.locations.forEach(l => rows.push([l, data.locationStats[l].count, data.locationStats[l].profit]));
        rows.push(['']);
        rows.push(['Unit Type Performance','','']);
        rows.push(['Unit Type','Bookings','Profit']);
        data.unitTypes.forEach(t => rows.push([t, data.unitTypeStats[t].count, data.unitTypeStats[t].profit]));
        rows.push(['']);
        rows.push(['Source Performance','','']);
        rows.push(['Source','Bookings','Profit']);
        data.sources.forEach(s => rows.push([s, data.sourceStats[s].count, data.sourceStats[s].profit]));
        rows.push(['']);
        rows.push(['Customer Retention & Loyalty','','']);
        rows.push(['Type','Bookings','Profit']);
        data.retentionLabels.forEach(ss => rows.push([ss, data.subSourceStats[ss].count, data.subSourceStats[ss].profit]));

        const csv = rows.map(r => r.join(',')).join('\n');

    // ----- Tab switching -----
    function switchTab(tab) {
        activeTab = tab;
        const tabBookings = document.getElementById('tabBookings');
        const tabAnalytics = document.getElementById('tabAnalytics');
        const contentBookings = document.getElementById('contentBookings');
        const contentAnalytics = document.getElementById('contentAnalytics');
        if (tab === 'bookings') {
            tabBookings.classList.add('active');
            tabAnalytics.classList.remove('active');
            contentBookings.classList.add('active');
            contentAnalytics.classList.remove('active');
            renderBookingsTable();
        } else {
            tabAnalytics.classList.add('active');
            tabBookings.classList.remove('active');
            contentAnalytics.classList.add('active');
            contentBookings.classList.remove('active');
            renderAnalytics();
